name: Deploy to prod
run-name: Deploy to prod ${{ github.ref_name }} by @${{ github.actor }}
on:
    workflow_dispatch:
    push:
        branches:
            - main
env:
    CI: true
    TZ: Europe/Amsterdam

jobs:
  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCS_SA_KEY_PROD }}

      - name: Upload files to GCS
        run: gcloud storage cp -r build "gs://veilarbvisittkortfs-prod"

      - name: Upload to CDN
        uses: nais/deploy/actions/cdn-upload/v2@master
        with:
          team: poao
          source: ./build/
          destination: /veilarbvisittkortfs-prod/

      - name: Set special cache for asset-manifest.json
        shell: bash
        run: |
          gcloud storage objects update "gs://${BUCKET_NAME}/poao/veilarbvisittkortfs-prod/build/asset-manifest.json" --cache-control="public, max-age=120, stale-while-revalidate=1800, stale-if-error=600"
